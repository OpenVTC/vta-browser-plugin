<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VTA Wallet — Login request</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #f6f7f9;
        color: #1d1f24;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 13px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
      }
      /* The consent sheet is its own `chrome.windows.create` popup, not the
         action popup — the ~800px action cap does not apply here. Fill whatever
         width the background opened the window at (see `consentWindowBounds` in
         background.ts) rather than pinning one: a fixed body width inside a
         wider window just leaves dead space. */
      body {
        width: 100%;
        box-sizing: border-box;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/confirm.tsx"></script>
  </body>
</html>
